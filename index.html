<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo-list-app</title>
  </head>
  <body>
    <div id="app">
      <header class="todo-header">
        <h1 class="todo-title">Todo List</h1>
      </header>
      <form class="todo-form" action="#" aria-label="Add todo">
        <input type="text" class="todo-input" name="todo" placeholder="What needs to be done?" autocomplete="off" />
        <button type="submit" class="todo-add-button">Add</button>
      </form>
      <ul class="todo-list" aria-label="Todo items"></ul>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
