<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div id="app">
      <div class="theme-toggle" role="group" aria-label="Theme">
        <button type="button" id="theme-dark" class="theme-toggle__option theme-toggle__option--dark" aria-pressed="true" aria-label="Dark theme" title="Dark theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button type="button" id="theme-light" class="theme-toggle__option theme-toggle__option--light" aria-pressed="false" aria-label="Light theme" title="Light theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
      <!-- App bar: title + auth -->
      <header class="app-bar">
        <h1 class="app-bar__title">Todos</h1>
        <div id="auth-signed-in" class="app-bar__user" hidden>
          <span class="app-bar__initial" id="auth-initial" aria-hidden="true"></span>
          <span id="auth-email" class="app-bar__email"></span>
          <button type="button" id="auth-sign-out" class="app-bar__logout">Logout</button>
        </div>
        <div id="auth-cta" class="app-bar__cta">
          <p id="auth-cta-message" class="app-bar__cta-message" hidden></p>
          <button type="button" id="auth-open-login" class="app-bar__login">Sign in</button>
          <button type="button" id="auth-open-signup" class="app-bar__signup">Get started</button>
        </div>
      </header>

      <dialog id="auth-modal" class="auth-modal" aria-labelledby="auth-modal-title">
        <div class="auth-modal__content">
          <div class="auth-modal__header">
            <button type="button" class="auth-modal__close" aria-label="Close" title="Close">
              <svg class="auth-modal__close-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <h2 id="auth-modal-title" class="auth-modal__title">Back in action!</h2>
          <p id="auth-modal-hint" class="auth-modal__hint">Step back into your todo zone</p>
          <form id="auth-signin-form" class="auth-form" aria-label="Sign in">
            <label for="auth-signin-email">Email</label>
            <input type="email" id="auth-signin-email" class="auth-input" placeholder="you@example.com" required autocomplete="email" />
            <label for="auth-signin-password">Password</label>
            <div class="auth-password-wrap">
              <input type="password" id="auth-signin-password" class="auth-input auth-input--password" placeholder="Password" autocomplete="current-password" />
              <button type="button" class="auth-password-toggle" aria-label="Show password" title="Show password">
                <svg class="auth-password-toggle__icon auth-password-toggle__icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="auth-password-toggle__icon auth-password-toggle__icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <button type="submit" class="auth-submit">Sign in</button>
            <button type="button" id="auth-switch-to-signup" class="auth-form__switch">New here? Create an account</button>
          </form>
          <form id="auth-signup-form" class="auth-form auth-form--hidden" aria-label="Get started">
            <label for="auth-signup-email">Email</label>
            <input type="email" id="auth-signup-email" class="auth-input" placeholder="you@example.com" required autocomplete="email" />
            <label for="auth-signup-password">Password</label>
            <div class="auth-password-wrap">
              <input type="password" id="auth-signup-password" class="auth-input auth-input--password" placeholder="At least 6 characters" minlength="6" autocomplete="new-password" />
              <button type="button" class="auth-password-toggle" aria-label="Show password" title="Show password">
                <svg class="auth-password-toggle__icon auth-password-toggle__icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="auth-password-toggle__icon auth-password-toggle__icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <button type="submit" class="auth-submit">Create my account</button>
            <button type="button" id="auth-switch-to-signin" class="auth-form__switch">Back again? Sign in</button>
          </form>
          <p id="auth-message" class="auth-message" role="alert" hidden></p>
        </div>
      </dialog>

      <!-- Main content -->
      <main class="main">
        <!-- Add task: one clear block -->
        <section class="add-block" aria-label="Add a task">
          <form class="add-form" action="#" aria-label="Add todo">
            <label for="todo-input" class="add-form__label">What's on your list today?</label>
            <div class="add-form__row">
              <input type="text" id="todo-input" class="add-form__input" name="todo" placeholder="Example: Finish reading that book" autocomplete="off" />
              <button type="submit" class="add-form__submit" id="todo-add-btn" aria-label="Add task">
                <span class="add-form__submit-icon" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </span>
                <span class="add-form__spinner" hidden aria-hidden="true"></span>
              </button>
            </div>
            <div class="add-form__category" role="group" aria-label="Category">
              <div class="add-form__chips">
                <button type="button" class="chip chip--active" data-category="general">General</button>
                <button type="button" class="chip" data-category="work">Work</button>
                <button type="button" class="chip" data-category="personal">Personal</button>
                <button type="button" class="chip" data-category="errands">Errands</button>
              </div>
            </div>
          </form>
          <p id="todo-error" class="add-form__error" role="alert" hidden></p>
        </section>

        <!-- Filter row: category (left) + status dropdown (right) -->
        <div class="filter-row" role="group" aria-label="Filter list">
          <div class="filter-bar" role="group" aria-label="Filter by category">
            <div class="filter-bar__options">
              <button type="button" class="filter-btn filter-btn--active" data-category="">Everything</button>
              <button type="button" class="filter-btn" data-category="general">General</button>
              <button type="button" class="filter-btn" data-category="work">Work</button>
              <button type="button" class="filter-btn" data-category="personal">Personal</button>
              <button type="button" class="filter-btn" data-category="errands">Errands</button>
            </div>
          </div>
          <div id="status-dropdown" class="status-dropdown" role="group" aria-label="Filter by status">
            <button type="button" id="status-filter-trigger" class="status-dropdown__trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="Status filter">
              <span id="status-filter-label" class="status-dropdown__label">View all</span>
              <svg class="status-dropdown__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div id="status-dropdown-panel" class="status-dropdown__panel" role="listbox" aria-hidden="true" hidden>
              <button type="button" class="status-dropdown__option status-dropdown__option--active" role="option" aria-selected="true" data-status="all">View all</button>
              <button type="button" class="status-dropdown__option" role="option" aria-selected="false" data-status="active">Active</button>
              <button type="button" class="status-dropdown__option" role="option" aria-selected="false" data-status="completed">Checked</button>
            </div>
          </div>
        </div>

        <!-- List -->
        <section class="list-section" aria-label="Your tasks">
          <div id="todo-empty" class="empty-state" hidden>No tasks yet. Add your first one above.</div>
          <div id="todo-no-match" class="empty-state" hidden>No tasks match your filter.</div>
          <ul class="todo-list" aria-label="Todo items"></ul>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden>
        <span class="toast__message"></span>
        <button type="button" class="toast__undo">Undo</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
